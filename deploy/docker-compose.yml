# Deploy on 192.168.1.26 next to existing csxs-postgres.
# Usage (on host): docker compose -f deploy/docker-compose.yml up -d --build
services:
  sunmao-server:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: sunmao-server
    restart: unless-stopped
    network_mode: host
    environment:
      DATABASE_URL: postgres://novel:admin123456@127.0.0.1:15432/sunmao
      SUNMAO_UI_DIR: /app/static
      RUST_LOG: sunmao_server=info
    # host network: publish not needed; listens 0.0.0.0:7420
    command:
      - --db
      - postgres://novel:admin123456@127.0.0.1:15432/sunmao
      - --listen
      - 0.0.0.0:7420
      - --unsafe-expose
